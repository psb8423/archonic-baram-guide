    let historyStack = [];
    const treeMenuEl = document.getElementById('tree-menu');
    const questionEl = document.getElementById('question');
    const contentEl = document.getElementById('content');
    const navBtns = document.getElementById('nav-btns');

    function buildTree(node, container, prefix = "") {
        if (node.options) {
            node.options.forEach(opt => {
                const li = document.createElement('li');
                li.className = "tree-item";
                const a = document.createElement('a');
                a.className = "tree-link";
                a.innerText = prefix + opt.text;
                a.onclick = () => { historyStack = [guideData]; render(opt.next || opt); };
                li.appendChild(a);

                if (opt.next && opt.next.options) {
                    const subUl = document.createElement('ul');
                    subUl.className = "tree-sub";
                    buildTree(opt.next, subUl, "");
                    li.appendChild(subUl);
                }
                container.appendChild(li);
            });
        }
    }

    function render(node, isBack = false) {
        if (!isBack) {
            historyStack.push(node);
        }
        
        contentEl.innerHTML = '';
        
        if (node.result) {
            questionEl.innerText = node.text || "가이드 결과"; 
            contentEl.innerHTML = `<div class="result">${node.result}</div>`;
        } else {
            questionEl.innerText = node.title || "항목을 선택하세요";
            
            node.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.text;
                btn.onclick = () => {
                    if (opt.next) {
                        render(opt.next);
                    } else {
                        render(opt); 
                    }
                };
                contentEl.appendChild(btn);
            });
        }

        if (historyStack.length > 1) {
            navBtns.style.display = 'flex';
        } else {
            navBtns.style.display = 'none';
        }
    }

    function goBack() {
        if (historyStack.length > 1) {
            historyStack.pop(); 
            const prevNode = historyStack[historyStack.length - 1]; 
            render(prevNode, true); 
        }
    }

    function goHome() {
        historyStack = [];
        render(guideData);
    }

    // 초기 실행
    buildTree(guideData, treeMenuEl);
    render(guideData);
</script>
